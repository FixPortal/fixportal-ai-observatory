    <!-- Set the theme synchronously before paint to avoid a flash of the wrong
         theme. ThemeProvider still owns runtime switching; this only seeds the
         initial value from the 'aiobs-theme' key / system preference. -->
    <script>
      (function () {
        try {
          var m = localStorage.getItem('aiobs-theme')
          var dark = m === 'dark' || ((m === null || m === 'system') &&
            window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.dataset.theme = dark ? 'dark' : 'light'
        } catch (e) { /* ignore */ }
      })()
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
