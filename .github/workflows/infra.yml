name: Infra

# Deploys the Bicep templates (incremental) only when infra changes, decoupled
# from the code-deploy pipeline (deploy.yml). Makes resource config self-healing
# — e.g. the API's httpsOnly is re-asserted from source on every infra change.
on:
  push:
    branches: [main]
    paths: ['infra/**']
  workflow_dispatch:

concurrency:
  group: infra-deploy
  cancel-in-progress: false

jobs:
  deploy-infra:
    name: Deploy (Bicep infra)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7.0.1

      - name: Lint workflows (actionlint)
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7 # v2
        with:
          shellcheck: true

      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep (incremental)
        run: az deployment group create -g fpaiobs-rg -f infra/main.bicep
