name: coverage

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  coverage:
    uses: FixPortal/fixportal-assets/.github/workflows/dotnet-coverage.yml@main
    with:
      solution: AiObservatory.slnx