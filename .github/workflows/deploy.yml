name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

# Each job is gated so only trusted main code ever deploys with the production
# secrets (pwn-request mitigation):
#   - workflow_run path: the triggering CI run must have been a *push* on *main*
#     (a pull_request CI run -- including from a fork -- never satisfies this), and
#   - workflow_dispatch path: must be dispatched from main.
# The checkout therefore takes the default ref (the main commit / github.sha)
# rather than the triggering run's head_sha, so untrusted PR code is never checked
# out and run with secret access.
jobs:
  deploy-api:
    name: Deploy (api)
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') }}
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v7

      - name: Lint workflows (actionlint)
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7 # v2
        with:
          shellcheck: true

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.x'
      - name: Publish
        run: dotnet publish src/AiObservatory.Api -c Release -o ./publish/api
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - uses: azure/webapps-deploy@02a81bead70021f5284939794bcec79c271ab383 # v3
        with:
          app-name: fpaiobs-api
          package: ./publish/api

  deploy-ingest:
    name: Deploy (ingest)
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') }}
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v7

      - name: Lint workflows (actionlint)
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7 # v2
        with:
          shellcheck: true

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.x'
      - name: Publish
        run: dotnet publish src/AiObservatory.Ingest -c Release -o ./publish/ingest
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - uses: azure/webapps-deploy@02a81bead70021f5284939794bcec79c271ab383 # v3
        with:
          app-name: fpaiobs-ingest
          package: ./publish/ingest

  deploy-web:
    name: Deploy (web)
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') }}
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v7

      - name: Lint workflows (actionlint)
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7 # v2
        with:
          shellcheck: true

      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'
      - run: npm ci
        working-directory: src/AiObservatory.Web
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm run build
        working-directory: src/AiObservatory.Web
        env:
          # All VITE_* below are build-time, baked into the public SPA bundle.
          # They are public identifiers (API URL, Entra app/tenant ids, scope) —
          # NOT secrets — so they live here rather than in a gitignored .env*,
          # which was silently dropped in the public-release history rewrite (the
          # original "Couldn't reach the API" + "session expired" outages).
          #
          # SWA Free tier can't proxy /api to the API App Service, so the prod
          # build calls the API cross-origin at its absolute URL.
          VITE_API_BASE: https://fpaiobs-api.azurewebsites.net
          # Entra (Azure AD) sign-in config. Without these the SPA's MSAL wiring
          # is a no-op (authEnabled=false) → no bearer token → API 401.
          VITE_AAD_CLIENT_ID: f3a9736e-1ba6-43b6-89f7-e799a9f93e9a
          VITE_AAD_TENANT_ID: c5eac41f-0525-4692-8705-7822be64d5ae
          VITE_AAD_API_SCOPE: api://f3a9736e-1ba6-43b6-89f7-e799a9f93e9a/access_as_user
      - uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          action: upload
          app_location: src/AiObservatory.Web/dist
          output_location: ''
          skip_app_build: true
