services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aiobservatory
      POSTGRES_USER: aiobs
      POSTGRES_PASSWORD: aiobs
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiobs -d aiobservatory"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - db-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: src/AiObservatory.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      DB_CONNECTION: "Host=db;Database=aiobservatory;Username=aiobs;Password=aiobs"
      OBSERVATORY_API_KEY: change-me
      # ANTHROPIC_API_KEY: sk-ant-...   # optional — leave unset to skip AI insights
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -H 'X-Observatory-Key: change-me' http://localhost:8080/api/aggregates || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  seed:
    image: curlimages/curl:latest
    depends_on:
      api:
        condition: service_healthy
    command: ["curl", "-sf", "-X", "POST", "http://api:8080/api/dev/seed", "-H", "X-Observatory-Key: change-me"]
    restart: "no"

  web:
    build:
      context: src/AiObservatory.Web
      dockerfile: Dockerfile
    ports:
      - "4173:80"
    depends_on:
      - api

volumes:
  db-data:
